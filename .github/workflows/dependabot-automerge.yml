# Dependabot auto-merge workflow
#
# Automatically merges Dependabot PRs that meet all safety conditions:
# - Only patch and minor updates (major updates require manual review)
# - CI must pass (typecheck, lint, test:unit, build)
# - Secret DEPENDABOT_MERGE_TOKEN must be set in repository secrets
#
# If DEPENDABOT_MERGE_TOKEN is not set, this workflow will fail gracefully
# and Dependabot PRs will require manual merge.

name: Dependabot auto-merge

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: >
      github.actor == 'dependabot[bot]' &&
      github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check if auto-merge is applicable
        id: check
        env:
          GH_TOKEN: ${{ secrets.DEPENDABOT_MERGE_TOKEN }}
        run: |
          # If token is not set, skip auto-merge
          if [ -z "$GH_TOKEN" ]; then
            echo "DEPENDABOT_MERGE_TOKEN is not set. Skipping auto-merge."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PR="${{ github.event.pull_request.title }}"

          # Check if it's a major update — skip auto-merge
          if echo "$PR" | grep -qi "major"; then
            echo "Major update detected — skipping auto-merge."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Wait for CI to succeed
        if: steps.check.outputs.skip == 'false'
        id: wait
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          repo-token: ${{ secrets.DEPENDABOT_MERGE_TOKEN }}
          wait-interval: 30
          running-workflow-name: "Dependabot auto-merge"

      - name: Auto-merge the Dependabot PR
        if: steps.check.outputs.skip == 'false' && steps.wait.outputs.conclusion == 'success'
        env:
          GH_TOKEN: ${{ secrets.DEPENDABOT_MERGE_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr merge --auto --squash "$PR_URL"
